name: elocuency
services:
  # 0. Entry Point (Caddy Reverse Proxy)
  caddy:
    image: caddy:alpine
    profiles: ["n8n"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ${ELO_WORKSPACE_PATH:-../elo-workspace}/caddy_data:/data
      - ${ELO_WORKSPACE_PATH:-../elo-workspace}/caddy_config:/config
      - ${ELO_WORKSPACE_PATH:-../elo-workspace}/logs/caddy:/var/log/caddy

  # 1. AI Logic Server (TypeScript/Fastify)
  elo-server:
    build:
      context: ../apps/elo-server
      dockerfile: ../../setup/Dockerfile
    environment:
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY:-}
      - GOOGLE_SEARCH_ENGINE_ID=${GOOGLE_SEARCH_ENGINE_ID:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - N8N_HOST=http://n8n:5678
      - N8N_WORKFLOWS_DIR=/app/elo-workspace/n8n/workflows
      - LOG_FILE=/app/elo-workspace/logs/elo-server.log
      - OBSIDIAN_API_KEY=${OBSIDIAN_API_KEY:-}
      - OBSIDIAN_URL=${OBSIDIAN_URL:-}
      - SERVER_AUTH_TOKEN=${SERVER_AUTH_TOKEN:-}
      - VAULT_PATH=/data/vault
    working_dir: /app/apps/elo-server
    ports:
      - "8001:8001"
    volumes:
      - ..:/app
      - ${VAULT_PATH}:/data/vault:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 2. Automation Engine (n8n)
  n8n:
    image: n8nio/n8n:latest
    profiles: ["n8n"]
    environment:
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Madrid}
      - N8N_LOG_LEVEL=info
      - N8N_PATH=/n8n/
    volumes:
      - ${ELO_WORKSPACE_PATH:-../elo-workspace}/n8n/data:/home/node/.n8n
      - ${ELO_WORKSPACE_PATH:-../elo-workspace}/n8n/workflows:/home/node/n8n/workflows
      - ${ELO_WORKSPACE_PATH:-../elo-workspace}/logs:/home/node/.n8n/logs
      - ${ELO_WORKSPACE_PATH:-../elo-workspace}/n8n:/home/node/n8n-root
    restart: unless-stopped

  # 3. Public Exposure (Ngrok)
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["n8n"]
    restart: unless-stopped
    command:
      - "http"
      - "caddy:80"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - caddy
